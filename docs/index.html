<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceNow SQL API · Setup wizard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="192x192" href="favicon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sf:#161b22;--sf2:#21262d;--bd:#30363d;
  --tx:#e6edf3;--tm:#8b949e;--ts:#6e7681;
  --ac:#3fb950;--ac-dim:#1a4422;--ac-glow:rgba(63,185,80,.15);
  --blue:#79c0ff;--amber:#e3b341;--red:#f85149;--purple:#d2a8ff;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.header{border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;background:var(--bg);z-index:100;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:13px;color:var(--ac)}
.logo-box{width:28px;height:28px;background:var(--ac-dim);border:1px solid var(--ac);border-radius:6px;display:grid;place-items:center;font-size:14px}
.header-sep{color:var(--bd);font-size:18px}
.header-title{font-size:13px;color:var(--tm);flex:1}
.badge{font-family:var(--mono);font-size:11px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:2px 8px;color:var(--ts)}
/* ── Language toggle ── */
.lang-toggle{display:flex;align-items:center;gap:0;border:1px solid var(--bd);border-radius:6px;overflow:hidden;flex-shrink:0}
.lang-btn{font-family:var(--mono);font-size:11px;padding:4px 10px;background:none;border:none;color:var(--ts);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.lang-btn:hover{background:var(--sf2);color:var(--tx)}
.lang-btn.active{background:var(--ac-dim);color:var(--ac)}
.lang-sep{width:1px;background:var(--bd);height:22px}
.flag{font-size:13px}
.prog-bar{padding:10px 24px;border-bottom:1px solid var(--bd);background:var(--sf);overflow-x:auto;scrollbar-width:none}
.prog-bar::-webkit-scrollbar{display:none}
.prog-steps{display:flex;align-items:center;gap:0;width:max-content}
.pdot{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.pdot:not(:last-child){flex-direction:row;align-items:center}
.pdot:not(:last-child)::after{content:'';display:block;width:36px;height:1px;background:var(--bd);flex-shrink:0}
.pdot.done::after{background:var(--ac)}
.pbub{width:26px;height:26px;border-radius:50%;border:1px solid var(--bd);display:grid;place-items:center;font-family:var(--mono);font-size:11px;color:var(--ts);background:var(--sf);transition:all .2s;flex-shrink:0}
.pdot.active .pbub{border-color:var(--ac);color:var(--ac);background:var(--ac-dim);box-shadow:0 0 0 3px var(--ac-glow)}
.pdot.done .pbub{border-color:var(--ac);background:var(--ac);color:#0d1117;font-weight:600}
.layout{display:grid;grid-template-columns:270px 1fr}
.sidebar{border-right:1px solid var(--bd);padding:20px 0;position:sticky;top:93px;height:calc(100vh - 93px);overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sb-section{padding:0 16px;margin-bottom:20px}
.sb-label{font-size:10px;font-family:var(--mono);color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding:0 8px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:6px;cursor:pointer;color:var(--tm);font-size:13px;border:none;background:none;width:100%;text-align:left;transition:background .15s}
.nav-btn:hover{background:var(--sf2);color:var(--tx)}
.nav-btn.active{background:var(--ac-dim);color:var(--ac);border-left:2px solid var(--ac);padding-left:6px}
.nav-btn.done .ncheck{background:var(--ac);border-color:var(--ac);color:#0d1117}
.nnum{font-family:var(--mono);font-size:11px;width:18px;text-align:right;flex-shrink:0;color:var(--ts)}
.nav-btn.active .nnum,.nav-btn.done .nnum{color:var(--ac)}
.ncheck{width:15px;height:15px;border-radius:50%;border:1px solid var(--bd);display:grid;place-items:center;flex-shrink:0;font-size:9px;color:transparent;transition:all .15s}
.sb-spacer{flex:1}
.cfg-panel{margin:0 16px 16px;padding:14px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px}
.cfg-title{font-size:11px;font-family:var(--mono);color:var(--ac);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.cfg-dot{width:6px;height:6px;background:var(--ac);border-radius:50%}
.fl{font-size:11px;color:var(--ts);margin-bottom:4px;font-family:var(--mono)}
.fi{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;color:var(--tx);font-family:var(--mono);font-size:12px;margin-bottom:10px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--ac)}
.fi::placeholder{color:var(--ts)}
.cfg-hint{font-size:11px;color:var(--ts);margin-top:-6px;margin-bottom:10px;line-height:1.5}
.main{padding:32px 40px;max-width:820px}
.step-panel{display:none;animation:fadeIn .2s ease}
.step-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.step-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px}
.step-num{font-family:var(--mono);font-size:11px;color:var(--ac);background:var(--ac-dim);border:1px solid var(--ac);border-radius:6px;padding:4px 10px;flex-shrink:0;margin-top:4px}
.step-title{font-size:22px;font-weight:600;color:var(--tx);line-height:1.3}
.step-desc{font-size:13px;color:var(--tm);margin-top:6px;line-height:1.7}
.cw{position:relative;margin:20px 0;border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.ch{display:flex;align-items:center;justify-content:space-between;background:var(--sf2);padding:7px 14px;border-bottom:1px solid var(--bd)}
.clang{font-family:var(--mono);font-size:11px;color:var(--ts)}
.cfile{font-family:var(--mono);font-size:11px;color:var(--amber)}
.copy-btn{font-family:var(--mono);font-size:11px;background:none;border:1px solid var(--bd);border-radius:4px;color:var(--tm);padding:3px 10px;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--ac);color:var(--ac)}
.copy-btn.ok{border-color:var(--ac);color:var(--ac);background:var(--ac-dim)}
.cb{background:#010409;padding:18px 20px;font-family:var(--mono);font-size:13px;line-height:1.8;color:#e6edf3;overflow-x:auto;white-space:pre}
.kw{color:#ff7b72}.str{color:#a5d6ff}.fn{color:#d2a8ff}.cmt{color:#8b949e;font-style:italic}
.var{color:#ffa657}.tpl{color:#3fb950;font-style:italic}.pth{color:#e3b341}.op{color:#79c0ff}
.alert{display:flex;gap:12px;padding:12px 16px;border-radius:8px;margin:16px 0;font-size:13px;line-height:1.6}
.a-warn{background:rgba(227,179,65,.08);border:1px solid rgba(227,179,65,.3);color:#f0d080}
.a-info{background:rgba(121,192,255,.08);border:1px solid rgba(121,192,255,.25);color:#a5d6ff}
.a-ok{background:var(--ac-glow);border:1px solid rgba(63,185,80,.3);color:#7ee787}
.ai{font-size:15px;flex-shrink:0;margin-top:1px}
.cklist{list-style:none;margin:20px 0}
.ci{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:opacity .15s}
.ci:last-child{border-bottom:none}
.ci:hover{opacity:.85}
.cbox{width:20px;height:20px;border:1px solid var(--bd);border-radius:4px;display:grid;place-items:center;flex-shrink:0;margin-top:1px;transition:all .15s;font-size:11px;color:transparent}
.ci.checked .cbox{background:var(--ac);border-color:var(--ac);color:#0d1117}
.ci-title{font-size:13px;font-weight:500;color:var(--tx)}
.ci.checked .ci-title{color:var(--tm);text-decoration:line-through;text-decoration-color:var(--ac)}
.ci-desc{font-size:12px;color:var(--tm);margin-top:3px;line-height:1.5}
.ck-prog{font-family:var(--mono);font-size:12px;color:var(--ts);margin-bottom:8px}
.ck-prog span{color:var(--ac)}
ic{font-family:var(--mono);font-size:12px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:1px 6px;color:var(--blue)}
/* ── Password row ── */
.pw-row{position:relative;margin-bottom:10px}
.pw-row .fi{margin-bottom:0;padding-right:36px}
.eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ts);cursor:pointer;font-size:13px;padding:2px;line-height:1;transition:color .15s}
.eye-btn:hover{color:var(--tm)}
/* ── .env panel ── */
.env-panel{margin:0 16px 16px;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.env-panel-hdr{display:flex;align-items:center;justify-content:space-between;background:var(--sf2);padding:8px 12px;border-bottom:1px solid var(--bd)}
.env-panel-title{font-family:var(--mono);font-size:11px;color:var(--amber);display:flex;align-items:center;gap:6px}
.env-dl-btn{font-family:var(--mono);font-size:11px;background:var(--ac-dim);border:1px solid var(--ac);border-radius:4px;color:var(--ac);padding:3px 10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.env-dl-btn:hover{background:var(--ac);color:#0d1117}
.env-dl-btn.ok{background:var(--ac);color:#0d1117}
.env-preview{background:#010409;padding:12px 14px;font-family:var(--mono);font-size:12px;line-height:1.9;white-space:pre;color:#e6edf3;overflow-x:auto}
/* ── .env in main content ── */
.env-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin:20px 0}
.env-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf2)}
.env-card-title{font-family:var(--mono);font-size:12px;color:var(--amber);display:flex;align-items:center;gap:8px}
.env-card-actions{display:flex;gap:8px}
.env-card-body{padding:16px 18px;font-family:var(--mono);font-size:13px;line-height:2;white-space:pre;overflow-x:auto;background:#010409;color:#e6edf3}
.env-security-note{display:flex;gap:10px;padding:10px 14px;background:rgba(227,179,65,.05);border-top:1px solid rgba(227,179,65,.15);font-size:11px;color:var(--ts);line-height:1.5;font-family:var(--mono)}
/* ── Query Runner ── */
.qr-layout{display:grid;grid-template-columns:190px 1fr;gap:20px;margin-bottom:24px}
.qr-templates{display:flex;flex-direction:column;gap:6px}
.qr-tpl-label{font-size:10px;font-family:var(--mono);color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.tpl-btn{font-family:var(--mono);font-size:12px;background:var(--sf);border:1px solid var(--bd);border-radius:5px;color:var(--tm);padding:7px 10px;cursor:pointer;text-align:left;transition:all .15s;white-space:nowrap}
.tpl-btn:hover{background:var(--sf2);color:var(--tx);border-color:var(--ac)}
.tpl-btn.active{background:var(--ac-dim);border-color:var(--ac);color:var(--ac)}
.qr-editor-wrap{display:flex;flex-direction:column;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.qr-editor-hdr{background:var(--sf2);padding:7px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.qr-editor-title{font-family:var(--mono);font-size:11px;color:var(--ts)}
.qr-sql{width:100%;background:#010409;color:#e6edf3;font-family:var(--mono);font-size:13px;line-height:1.7;padding:16px 18px;border:none;outline:none;resize:vertical;min-height:140px;tab-size:2}
.qr-sql::placeholder{color:var(--ts)}
.qr-editor-footer{background:var(--sf2);padding:7px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.qr-fmt-label{font-family:var(--mono);font-size:11px;color:var(--ts);margin-right:4px}
.fmt-tab{font-family:var(--mono);font-size:11px;background:none;border:1px solid var(--bd);border-radius:4px;color:var(--ts);padding:3px 10px;cursor:pointer;transition:all .15s}
.fmt-tab:hover{background:var(--sf);color:var(--tm)}
.fmt-tab.active{background:var(--ac-dim);border-color:var(--ac);color:var(--ac)}
.qr-out-wrap{margin-bottom:24px}
.qr-out-hdr{display:flex;align-items:center;justify-content:space-between;background:var(--sf2);padding:7px 14px;border:1px solid var(--bd);border-bottom:none;border-radius:8px 8px 0 0}
.qr-out-title{font-family:var(--mono);font-size:11px;color:var(--ts)}
.qr-out-body{background:#010409;padding:16px 18px;font-family:var(--mono);font-size:13px;line-height:1.8;color:#e6edf3;overflow-x:auto;white-space:pre;border:1px solid var(--bd);border-top:none;border-radius:0 0 8px 8px;min-height:80px}
.table-ref{margin-top:4px}
.tref-row{border:1px solid var(--bd);border-radius:6px;margin-bottom:6px;overflow:hidden}
.tref-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;background:var(--sf);transition:background .15s;gap:12px}
.tref-hdr:hover{background:var(--sf2)}
.tref-name{font-family:var(--mono);font-size:12px;color:var(--blue);flex-shrink:0}
.tref-desc{font-size:12px;color:var(--ts);text-align:right}
.tref-body{display:none;padding:12px 14px;background:var(--bg);border-top:1px solid var(--bd)}
.tref-row.open .tref-body{display:block}
.col-pill{display:inline-block;font-family:var(--mono);font-size:11px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:2px 8px;margin:3px 4px 3px 0;color:var(--blue);cursor:pointer;transition:all .15s}
.col-pill:hover{border-color:var(--ac);color:var(--ac);background:var(--ac-dim)}
.col-pill-hint{font-size:11px;color:var(--ts);margin-top:8px}
@media(max-width:768px){.qr-layout{grid-template-columns:1fr}}
/* ── ZIP download ── */
.zip-panel{margin:0 16px 16px;border:1px solid var(--ac);border-radius:8px;overflow:hidden}
.zip-panel-hdr{background:var(--ac-dim);padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.zip-panel-title{font-family:var(--mono);font-size:11px;color:var(--ac);display:flex;align-items:center;gap:6px}
.zip-dl-btn{font-family:var(--mono);font-size:11px;background:var(--ac);border:1px solid var(--ac);border-radius:4px;color:#0d1117;padding:4px 12px;cursor:pointer;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:5px}
.zip-dl-btn:hover{background:#56d364;border-color:#56d364}
.zip-dl-btn:disabled{opacity:.5;cursor:not-allowed}
.zip-preview{background:#010409;padding:10px 14px;font-family:var(--mono);font-size:11px;line-height:1.8;color:var(--ts)}
.zip-file{color:var(--amber)}
.zip-file.filled{color:var(--ac)}
/* ── Progress persistence badge ── */
.persist-badge{font-family:var(--mono);font-size:10px;color:var(--ts);padding:0 8px;display:flex;align-items:center;gap:5px;flex-shrink:0}
.persist-dot{width:6px;height:6px;border-radius:50%;background:var(--ts);transition:background .3s}
.persist-dot.saved{background:var(--ac)}
/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sf2);border:1px solid var(--ac);border-radius:8px;padding:10px 18px;font-family:var(--mono);font-size:12px;color:var(--ac);z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
/* ── Table search ── */
.tref-search{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:7px 12px;color:var(--tx);font-family:var(--mono);font-size:12px;margin-bottom:12px;outline:none;transition:border-color .15s}
.tref-search:focus{border-color:var(--ac)}
.tref-search::placeholder{color:var(--ts)}
.tref-row.hidden{display:none}
/* ── Mobile drawer ── */
.mob-menu-btn{display:none;background:none;border:1px solid var(--bd);border-radius:6px;color:var(--tm);font-size:16px;padding:4px 9px;cursor:pointer;line-height:1;transition:all .15s}
.mob-menu-btn:hover{background:var(--sf2);color:var(--tx)}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(2px)}
.drawer-overlay.open{display:block}
.sidebar{border-right:1px solid var(--bd);padding:20px 0;position:sticky;top:93px;height:calc(100vh - 93px);overflow-y:auto;display:flex;flex-direction:column;gap:0;transition:transform .25s ease}
/* ── Keyboard shortcut button & modal ── */
.kbd-btn{font-family:var(--mono);font-size:11px;background:none;border:1px solid var(--bd);border-radius:5px;color:var(--ts);padding:4px 8px;cursor:pointer;transition:all .15s;flex-shrink:0}
.kbd-btn:hover{background:var(--sf2);color:var(--tm)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px 28px;min-width:320px;max-width:440px;width:90%}
.modal-title{font-size:15px;font-weight:500;color:var(--tx);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--ts);cursor:pointer;font-size:18px;padding:0;line-height:1;transition:color .15s}
.modal-close:hover{color:var(--tx)}
.kbd-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}
.kbd-row:last-child{border-bottom:none}
.kbd-desc{color:var(--tm)}
.kbd-keys{display:flex;gap:4px}
kbd{font-family:var(--mono);font-size:11px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:2px 7px;color:var(--tx)}
/* ── Saved queries ── */
.sq-divider{font-size:10px;font-family:var(--mono);color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 6px;padding-top:10px;border-top:1px solid var(--bd)}
.sq-item{display:flex;align-items:center;gap:0;border:1px solid var(--bd);border-radius:5px;overflow:hidden;margin-bottom:5px}
.sq-load{flex:1;font-family:var(--mono);font-size:12px;background:var(--sf);border:none;color:var(--tm);padding:6px 10px;cursor:pointer;text-align:left;transition:background .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sq-load:hover{background:var(--sf2);color:var(--tx)}
.sq-del{background:none;border:none;border-left:1px solid var(--bd);color:var(--ts);cursor:pointer;padding:6px 9px;font-size:12px;transition:all .15s;flex-shrink:0}
.sq-del:hover{background:var(--sf2);color:var(--red)}
.sq-empty{font-family:var(--mono);font-size:11px;color:var(--ts);padding:6px 0}
/* ── Save-query inline prompt ── */
.sq-prompt{display:none;flex-direction:column;gap:6px;margin-top:8px;padding:10px;background:var(--sf2);border:1px solid var(--bd);border-radius:6px}
.sq-prompt.open{display:flex}
.sq-prompt-row{display:flex;gap:6px}
.sq-name-input{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;color:var(--tx);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s}
.sq-name-input:focus{border-color:var(--ac)}
.sq-save-confirm{font-family:var(--mono);font-size:11px;background:var(--ac);border:1px solid var(--ac);border-radius:4px;color:#0d1117;padding:5px 12px;cursor:pointer;font-weight:600;transition:all .15s}
.sq-save-confirm:hover{background:#56d364}
.sq-cancel{font-family:var(--mono);font-size:11px;background:none;border:1px solid var(--bd);border-radius:4px;color:var(--ts);padding:5px 10px;cursor:pointer;transition:all .15s}
.sq-cancel:hover{background:var(--sf);color:var(--tm)}
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:flex;position:fixed;left:0;top:0;height:100vh;width:280px;background:var(--bg);z-index:210;transform:translateX(-100%);border-right:1px solid var(--bd)}
  .sidebar.drawer-open{transform:translateX(0)}
  .main{padding:20px 16px}
  .header-title{display:none}
  .mob-menu-btn{display:block}
}
.navbtns{display:flex;justify-content:space-between;align-items:center;margin-top:40px;padding-top:24px;border-top:1px solid var(--bd)}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:9px 20px;border-radius:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;border:1px solid var(--bd);background:none;color:var(--tm)}
.btn:hover{background:var(--sf2);color:var(--tx)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-p{background:var(--ac);border-color:var(--ac);color:#0d1117;font-weight:600}
.btn-p:hover{background:#56d364;border-color:#56d364;color:#0d1117}
.issue{border:1px solid var(--bd);border-radius:8px;margin-bottom:10px;overflow:hidden}
.ish{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:var(--sf);transition:background .15s}
.ish:hover{background:var(--sf2)}
.ist{font-family:var(--mono);font-size:12px;color:var(--red);display:flex;align-items:center;gap:10px}
.ib{display:none;padding:16px;background:var(--bg);font-size:13px;color:var(--tm);line-height:1.7;border-top:1px solid var(--bd)}
.issue.open .ib{display:block}
.chev{color:var(--ts);transition:transform .2s;font-size:11px}
.issue.open .chev{transform:rotate(180deg)}
.sdiv{display:flex;align-items:center;gap:12px;margin:24px 0 16px;font-size:10px;font-family:var(--mono);color:var(--ts);text-transform:uppercase;letter-spacing:.1em}
.sdiv::before,.sdiv::after{content:'';flex:1;height:1px;background:var(--bd)}
p{margin-bottom:12px;color:var(--tm);line-height:1.7}
strong{color:var(--tx);font-weight:500}
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:20px 16px}
  .header-title{display:none}
}
.repo-banner{font-family:var(--sans);font-size:12px;padding:10px 24px;background:var(--sf);border-bottom:1px solid var(--bd);color:var(--tm);line-height:1.5}
.repo-banner a{color:var(--blue);font-weight:500;text-decoration:none}
.repo-banner a:hover{text-decoration:underline}
</style>
</head>

<div class="repo-banner" id="repoBanner"></div>
<div class="toast" id="toast"></div>

<!-- Keyboard shortcuts modal -->
<div class="modal-overlay" id="kbdModal" onclick="closeKbdModal(event)">
  <div class="modal-box">

  </div>
</div>

<!-- Mobile drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<div class="prog-bar">
  <div class="prog-steps" id="progSteps"></div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sb-section">
      <div class="sb-label" id="sbLabel">Steps</div>
      <div id="navList"></div>
    </div>
    <div class="sb-spacer"></div>
    <div class="cfg-panel">
      <div class="cfg-title"><div class="cfg-dot"></div> <span id="cfgPanelTitle">Your instance config</span></div>
      <div class="fl" id="lblInstance">Instance name</div>
      <input class="fi" id="cfgInstance" placeholder="mycompany" value="mycompany">
      <div class="cfg-hint" id="hintInstance">→ mycompany.service-now.com</div>
      <div class="fl" id="lblUser">Service account username</div>
      <input class="fi" id="cfgUser" placeholder="svc_jdbc_account" value="svc_jdbc_account">
      <div class="fl" id="lblPass">Password</div>
      <div class="pw-row">
        <input class="fi" id="cfgPass" type="password" placeholder="••••••••" autocomplete="off">
        <button class="eye-btn" id="eyeBtn" onclick="toggleEye()" title="Show/hide">👁</button>
      </div>
      <div class="fl" id="lblJar">JAR file path (in container)</div>
      <input class="fi" id="cfgJar" placeholder="/app/drivers/servicenow-jdbc.jar" value="/app/drivers/servicenow-jdbc.jar">
      <div class="cfg-hint" id="hintSnippets">Code snippets update live ↑</div>
    </div>

    <!-- .env download panel -->
    <div class="env-panel">
      <div class="env-panel-hdr">
        <div class="env-panel-title">⬇ <span id="envPanelTitle">.env file</span></div>
        <button class="env-dl-btn" id="sidebarDlBtn" onclick="downloadEnv()">
          <span id="sidebarDlLabel">download .env</span>
        </button>
      </div>
      <div class="env-preview" id="envPreview"></div>
    </div>

    <!-- Project ZIP panel -->
    <div class="zip-panel">
      <div class="zip-panel-hdr">
        <div class="zip-panel-title">⬇ <span id="zipPanelTitle">Download project</span></div>
        <button class="zip-dl-btn" id="zipDlBtn" onclick="downloadZip()">
          <span id="zipDlLabel">project.zip</span>
        </button>
      </div>
      <div class="zip-preview" id="zipPreview"></div>
    </div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

&nbsp;3. Confirm the role <ic>sn_jdbc_rest_access</ic> is assigned.<br>

// ── Render ───────────────────────────────────────────────
function render() {
  const steps = T().steps;
  document.getElementById('navList').innerHTML = steps.map((s, i) => `
    <button class="nav-btn ${i===current?'active':''} ${done.has(i)?'done':''}" onclick="goTo(${i})">
      <span class="nnum">${String(i+1).padStart(2,'0')}</span>
      <div class="ncheck">${done.has(i)?'✓':''}</div>
      <span>${s.title}</span>
    </button>`).join('');

  document.getElementById('progSteps').innerHTML = steps.map((s, i) => `
    <div class="pdot ${i===current?'active':''} ${done.has(i)?'done':''}" onclick="goTo(${i})">
      <div class="pbub">${done.has(i)?'✓':i+1}</div>
    </div>`).join('');

  const mainEl = document.getElementById('mainContent');
  mainEl.innerHTML = CONTENT[current]();

  if (current < 10) {
    const nav = document.createElement('div');
    nav.className = 'navbtns';
    const last = current === 9;
    nav.innerHTML = `
      <button class="btn" onclick="goTo(${current-1})" ${current===0?'disabled':''}>${T().back}</button>
      <button class="btn btn-p" onclick="${last ? 'restart()' : 'advance()'}">${last ? T().restart : T().next}</button>`;
    mainEl.appendChild(nav);
  }

  updateTpl();
  updateEnvPreview();
  if (current === 8) { qrRefresh(); sqRender(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goTo(i)  { if(i>=0 && i<10){ current=i; render(); saveProgress(); } }
function advance(){ done.add(current); if(current<9){ current++; render(); saveProgress(); } }
function restart(){ current=0; done.clear(); clearProgress(); render(); }

// ── Keyboard shortcuts ────────────────────────────────────
function openKbdModal() {
  const modal = document.getElementById('kbdModal');
  const body  = document.getElementById('kbdModalBody');
  document.getElementById('kbdModalTitle').textContent = T().kbdModalTitle;
  body.innerHTML = T().kbdShortcuts.map(s => `
    <div class="kbd-row">
      <span class="kbd-desc">${s.desc}</span>
      <span class="kbd-keys">${s.keys.map(k => `<kbd>${k}</kbd>`).join('')}</span>
    </div>`).join('');
  modal.classList.add('open');
}
function closeKbdModal(e) {
  if (e && e.target !== document.getElementById('kbdModal')) return;
  document.getElementById('kbdModal').classList.remove('open');
}

document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  const inInput = tag === 'INPUT' || tag === 'TEXTAREA';

  // Escape always closes modals/drawer
  if (e.key === 'Escape') {
    document.getElementById('kbdModal').classList.remove('open');
    closeDrawer();
    sqHidePrompt();
    return;
  }
  if (inInput) return;

  if (e.key === 'ArrowRight' || e.key === ']') { e.preventDefault(); advance(); }
  else if (e.key === 'ArrowLeft' || e.key === '[') { e.preventDefault(); goTo(current - 1); }
  else if (e.key === '?') openKbdModal();
  else if (e.key >= '1' && e.key <= '9') goTo(parseInt(e.key) - 1);
});

// ── Saved queries ─────────────────────────────────────────
const SQ_KEY = 'sn-jdbc-saved-queries';
let savedQueries = [];

function sqLoad() {
  try {

    savedQueries = raw ? JSON.parse(raw) : [];
  } catch(e) { savedQueries = []; }
}
function sqSave() {
  try { localStorage.setItem(SQ_KEY, JSON.stringify(savedQueries)); } catch(e) {}
}

function sqRender() {
  const list = document.getElementById('sqList');
  if (!list) return;
  const t = T();

}
function sqKeydown(e) {

function sqConfirm() {

function showToast(msg) {

// ── Progress persistence (localStorage) ──────────────────
const LS_KEY = 'sn-sql-api-wizard-progress';

function saveProgress() {
  try {
    const state = {
      current,
      lang,
      cfg: { instance: cfg.instance, user: cfg.user, jar: cfg.jar },
      // done is intentionally NOT saved — steps marked as complete
      // were just navigation clicks, not real completions.
      // They reset on every page load so the guide always starts clean.
    };
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    const dot = document.getElementById('persistDot');
    if (dot) { dot.classList.add('saved'); }
  } catch(e) { /* private browsing — silently ignore */ }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const state = JSON.parse(raw);
    // done is NOT restored — steps always start unmarked on fresh load.
    // Also strip any legacy "done" key that may have been saved by older versions.
    if (state.done) { delete state.done; localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    if (state.current !== undefined) current = state.current;
    if (state.lang)     lang = state.lang;
    if (state.cfg) {
      if (state.cfg.instance) { cfg.instance = state.cfg.instance; document.getElementById('cfgInstance').value = cfg.instance; }
      if (state.cfg.user)     { cfg.user     = state.cfg.user;     document.getElementById('cfgUser').value     = cfg.user;     }
      if (state.cfg.jar)      { cfg.jar      = state.cfg.jar;      document.getElementById('cfgJar').value      = cfg.jar;      }
    }
    if (lang === 'pt') {
      document.getElementById('btnEN').classList.remove('active');
      document.getElementById('btnPT').classList.add('active');
      document.documentElement.lang = 'pt-BR';
    }
    const dot = document.getElementById('persistDot');
    if (dot) dot.classList.add('saved');
  } catch(e) { /* corrupted storage — ignore */ }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  const dot = document.getElementById('persistDot');
  if (dot) dot.classList.remove('saved');
}

function trefFilter(query) {
  const q = query.trim().toLowerCase();
  document.querySelectorAll('#tableRef .tref-row').forEach(row => {
    const name = row.querySelector('.tref-name')?.textContent?.toLowerCase() || '';
    const cols = Array.from(row.querySelectorAll('.col-pill')).map(p => p.textContent.toLowerCase()).join(' ');
    const matches = !q || name.includes(q) || cols.includes(q);
    row.classList.toggle('hidden', !matches);
    if (matches && q) row.classList.add('open');
  });
}
let qrFmt = 'script';

function escJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

function qrSetTemplate(btn, sqlEncoded) {
  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const ta = document.getElementById('qrSql');
  if (ta) { ta.value = sqlEncoded.replace(/\\n/g,'\n').replace(/\\'/g,"'"); qrRefresh(); }
}

function qrSetFmt(fmt, btn) {
  qrFmt = fmt;
  document.querySelectorAll('.fmt-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  qrRefresh();
}

function qrTab(e) {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const ta = e.target;
  const s = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.substring(0,s) + '  ' + ta.value.substring(end);
  ta.selectionStart = ta.selectionEnd = s + 2;
}

function qrInsertCol(col) {
  const ta = document.getElementById('qrSql');
  if (!ta) return;
  const sql = ta.value;
  // Find the SELECT … FROM pattern and inject the column
  const m = sql.match(/^(\s*SELECT\s+)([\s\S]*?)(\s+FROM\s+)/im);
  if (m) {
    const existing = m[2].trim();
    if (existing === '*') {
      ta.value = sql.replace(/^(\s*SELECT\s+)\*(\s+FROM\s+)/im, `$1${col}$2`);
    } else {
      ta.value = sql.replace(/^(\s*SELECT\s+)([\s\S]*?)(\s+FROM\s+)/im, `$1$2, ${col}$3`);
    }
  } else {
    ta.value = sql + ', ' + col;
  }
  qrRefresh();
  ta.focus();
}

function qrRefresh() {
  const ta = document.getElementById('qrSql');
  const out = document.getElementById('qrOutput');
  if (!ta || !out) return;
  const sql = ta.value.trim();
  if (!sql) { out.innerHTML = '<span style="color:var(--ts)">← write SQL to generate an HTTP snippet</span>'; return; }

  let code = '';
  if (qrFmt === 'script') {
    code = genCurlQuery(sql);
  } else if (qrFmt === 'oneliner') {
    code = genCurlQueryWithKey(sql);
  } else if (qrFmt === 'exec') {
    code = genCurlSchemaTables();
  } else if (qrFmt === 'pandas') {
    code = genPyRequests(sql);
  }
  out.innerHTML = syntaxHL(code);
}

function syntaxHL(code) {
  return escHtml(code)
    .replace(/\b(import|from|def|return|with|as|for|in|if|not|and|or|print|True|False|None)\b/g, '<span class="kw">$1</span>')
    .replace(/("""[\s\S]*?"""|\'\'\'[\s\S]*?\'\'\'|"[^"]*"|\'[^\']*\')/g, '<span class="str">$1</span>')
    .replace(/#.*/g, '<span class="cmt">$&</span>')
    .replace(/\b(curl|jq|requests|json|jaydebeapi|os|csv|sys|pandas|pd|run_query|get_connection|connect|cursor|execute|fetchall|description|DataFrame|to_csv|to_json|open|writer|writerow|writerows|environ)\b/g, '<span class="fn">$1</span>');
}

function shellSingleQuotedJson(obj) {
  const raw = JSON.stringify(obj);
  return "'" + raw.replace(/'/g, "'\\''") + "'";
}

function sqlOneLine(sql) { return sql.replace(/\s*\n\s*/g, ' ').replace(/\s+/g, ' ').trim(); }

function genCurlQuery(sql) {
  const body = { query: sqlOneLine(sql) };
  return `# POST /query — uses server .env (no x-api-key unless API_KEY is set)
curl -sS -X POST http://localhost:8000/query \\
  -H 'Content-Type: application/json' \\
  -d ${shellSingleQuotedJson(body)}`;
}

function genCurlQueryWithKey(sql) {
  const body = { query: sqlOneLine(sql) };
  return `# Same as above but with API key (set API_KEY in .env on the server)
curl -sS -X POST http://localhost:8000/query \\
  -H 'Content-Type: application/json' \\
  -H 'x-api-key: YOUR_API_KEY' \\
  -d ${shellSingleQuotedJson(body)}`;
}

function genCurlSchemaTables() {
  const body = { pattern: 'incident%' };
  return `# POST /schema/tables — optional LIKE pattern
curl -sS -X POST http://localhost:8000/schema/tables \\
  -H 'Content-Type: application/json' \\
  -d ${shellSingleQuotedJson(body)}

# Columns for one table:
curl -sS -X POST http://localhost:8000/schema/columns \\
  -H 'Content-Type: application/json' \\
  -d ${shellSingleQuotedJson({ table: 'incident' })}`;
}

function genPyRequests(sql) {
  const q = sqlOneLine(sql);
  const pyStr = JSON.stringify(q);
  return `import requests

url = "http://localhost:8000/query"
payload = {"query": ${pyStr}}
# headers = {"x-api-key": "YOUR_KEY"}  # if API_KEY is set on the server

r = requests.post(url, json=payload, timeout=120)
r.raise_for_status()
print(r.json())`;
}

function qrCopy(btn) {
  const out = document.getElementById('qrOutput');
  if (!out) return;
  navigator.clipboard.writeText(out.innerText).then(() => {
    const orig = btn.textContent;
    btn.textContent = T().copied;
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = T().queryRunner.copyOut; btn.classList.remove('ok'); }, 2000);
  });
}

if (_rgb) _rgb.textContent = T().repoGuideBadge;
