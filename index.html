<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceNow JDBC · Python Container Setup</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="192x192" href="favicon-192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sf:#161b22;--sf2:#21262d;--bd:#30363d;
  --tx:#e6edf3;--tm:#8b949e;--ts:#6e7681;
  --ac:#3fb950;--ac-dim:#1a4422;--ac-glow:rgba(63,185,80,.15);
  --blue:#79c0ff;--amber:#e3b341;--red:#f85149;--purple:#d2a8ff;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.header{border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;background:var(--bg);z-index:100;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:13px;color:var(--ac)}
.logo-box{width:28px;height:28px;background:var(--ac-dim);border:1px solid var(--ac);border-radius:6px;display:grid;place-items:center;font-size:14px}
.header-sep{color:var(--bd);font-size:18px}
.header-title{font-size:13px;color:var(--tm);flex:1}
.badge{font-family:var(--mono);font-size:11px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:2px 8px;color:var(--ts)}
/* ── Language toggle ── */
.lang-toggle{display:flex;align-items:center;gap:0;border:1px solid var(--bd);border-radius:6px;overflow:hidden;flex-shrink:0}
.lang-btn{font-family:var(--mono);font-size:11px;padding:4px 10px;background:none;border:none;color:var(--ts);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.lang-btn:hover{background:var(--sf2);color:var(--tx)}
.lang-btn.active{background:var(--ac-dim);color:var(--ac)}
.lang-sep{width:1px;background:var(--bd);height:22px}
.flag{font-size:13px}
.prog-bar{padding:10px 24px;border-bottom:1px solid var(--bd);background:var(--sf);overflow-x:auto;scrollbar-width:none}
.prog-bar::-webkit-scrollbar{display:none}
.prog-steps{display:flex;align-items:center;gap:0;width:max-content}
.pdot{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.pdot:not(:last-child){flex-direction:row;align-items:center}
.pdot:not(:last-child)::after{content:'';display:block;width:36px;height:1px;background:var(--bd);flex-shrink:0}
.pdot.done::after{background:var(--ac)}
.pbub{width:26px;height:26px;border-radius:50%;border:1px solid var(--bd);display:grid;place-items:center;font-family:var(--mono);font-size:11px;color:var(--ts);background:var(--sf);transition:all .2s;flex-shrink:0}
.pdot.active .pbub{border-color:var(--ac);color:var(--ac);background:var(--ac-dim);box-shadow:0 0 0 3px var(--ac-glow)}
.pdot.done .pbub{border-color:var(--ac);background:var(--ac);color:#0d1117;font-weight:600}
.layout{display:grid;grid-template-columns:270px 1fr}
.sidebar{border-right:1px solid var(--bd);padding:20px 0;position:sticky;top:93px;height:calc(100vh - 93px);overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sb-section{padding:0 16px;margin-bottom:20px}
.sb-label{font-size:10px;font-family:var(--mono);color:var(--ts);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding:0 8px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:6px;cursor:pointer;color:var(--tm);font-size:13px;border:none;background:none;width:100%;text-align:left;transition:background .15s}
.nav-btn:hover{background:var(--sf2);color:var(--tx)}
.nav-btn.active{background:var(--ac-dim);color:var(--ac);border-left:2px solid var(--ac);padding-left:6px}
.nav-btn.done .ncheck{background:var(--ac);border-color:var(--ac);color:#0d1117}
.nnum{font-family:var(--mono);font-size:11px;width:18px;text-align:right;flex-shrink:0;color:var(--ts)}
.nav-btn.active .nnum,.nav-btn.done .nnum{color:var(--ac)}
.ncheck{width:15px;height:15px;border-radius:50%;border:1px solid var(--bd);display:grid;place-items:center;flex-shrink:0;font-size:9px;color:transparent;transition:all .15s}
.sb-spacer{flex:1}
.cfg-panel{margin:0 16px 16px;padding:14px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px}
.cfg-title{font-size:11px;font-family:var(--mono);color:var(--ac);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.cfg-dot{width:6px;height:6px;background:var(--ac);border-radius:50%}
.fl{font-size:11px;color:var(--ts);margin-bottom:4px;font-family:var(--mono)}
.fi{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;color:var(--tx);font-family:var(--mono);font-size:12px;margin-bottom:10px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--ac)}
.fi::placeholder{color:var(--ts)}
.cfg-hint{font-size:11px;color:var(--ts);margin-top:-6px;margin-bottom:10px;line-height:1.5}
.main{padding:32px 40px;max-width:820px}
.step-panel{display:none;animation:fadeIn .2s ease}
.step-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.step-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px}
.step-num{font-family:var(--mono);font-size:11px;color:var(--ac);background:var(--ac-dim);border:1px solid var(--ac);border-radius:6px;padding:4px 10px;flex-shrink:0;margin-top:4px}
.step-title{font-size:22px;font-weight:600;color:var(--tx);line-height:1.3}
.step-desc{font-size:13px;color:var(--tm);margin-top:6px;line-height:1.7}
.cw{position:relative;margin:20px 0;border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.ch{display:flex;align-items:center;justify-content:space-between;background:var(--sf2);padding:7px 14px;border-bottom:1px solid var(--bd)}
.clang{font-family:var(--mono);font-size:11px;color:var(--ts)}
.cfile{font-family:var(--mono);font-size:11px;color:var(--amber)}
.copy-btn{font-family:var(--mono);font-size:11px;background:none;border:1px solid var(--bd);border-radius:4px;color:var(--tm);padding:3px 10px;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--ac);color:var(--ac)}
.copy-btn.ok{border-color:var(--ac);color:var(--ac);background:var(--ac-dim)}
.cb{background:#010409;padding:18px 20px;font-family:var(--mono);font-size:13px;line-height:1.8;color:#e6edf3;overflow-x:auto;white-space:pre}
.kw{color:#ff7b72}.str{color:#a5d6ff}.fn{color:#d2a8ff}.cmt{color:#8b949e;font-style:italic}
.var{color:#ffa657}.tpl{color:#3fb950;font-style:italic}.pth{color:#e3b341}.op{color:#79c0ff}
.alert{display:flex;gap:12px;padding:12px 16px;border-radius:8px;margin:16px 0;font-size:13px;line-height:1.6}
.a-warn{background:rgba(227,179,65,.08);border:1px solid rgba(227,179,65,.3);color:#f0d080}
.a-info{background:rgba(121,192,255,.08);border:1px solid rgba(121,192,255,.25);color:#a5d6ff}
.a-ok{background:var(--ac-glow);border:1px solid rgba(63,185,80,.3);color:#7ee787}
.ai{font-size:15px;flex-shrink:0;margin-top:1px}
.cklist{list-style:none;margin:20px 0}
.ci{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:opacity .15s}
.ci:last-child{border-bottom:none}
.ci:hover{opacity:.85}
.cbox{width:20px;height:20px;border:1px solid var(--bd);border-radius:4px;display:grid;place-items:center;flex-shrink:0;margin-top:1px;transition:all .15s;font-size:11px;color:transparent}
.ci.checked .cbox{background:var(--ac);border-color:var(--ac);color:#0d1117}
.ci-title{font-size:13px;font-weight:500;color:var(--tx)}
.ci.checked .ci-title{color:var(--tm);text-decoration:line-through;text-decoration-color:var(--ac)}
.ci-desc{font-size:12px;color:var(--tm);margin-top:3px;line-height:1.5}
.ck-prog{font-family:var(--mono);font-size:12px;color:var(--ts);margin-bottom:8px}
.ck-prog span{color:var(--ac)}
ic{font-family:var(--mono);font-size:12px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:1px 6px;color:var(--blue)}
/* ── Password row ── */
.pw-row{position:relative;margin-bottom:10px}
.pw-row .fi{margin-bottom:0;padding-right:36px}
.eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ts);cursor:pointer;font-size:13px;padding:2px;line-height:1;transition:color .15s}
.eye-btn:hover{color:var(--tm)}
/* ── .env panel ── */
.env-panel{margin:0 16px 16px;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.env-panel-hdr{display:flex;align-items:center;justify-content:space-between;background:var(--sf2);padding:8px 12px;border-bottom:1px solid var(--bd)}
.env-panel-title{font-family:var(--mono);font-size:11px;color:var(--amber);display:flex;align-items:center;gap:6px}
.env-dl-btn{font-family:var(--mono);font-size:11px;background:var(--ac-dim);border:1px solid var(--ac);border-radius:4px;color:var(--ac);padding:3px 10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.env-dl-btn:hover{background:var(--ac);color:#0d1117}
.env-dl-btn.ok{background:var(--ac);color:#0d1117}
.env-preview{background:#010409;padding:12px 14px;font-family:var(--mono);font-size:12px;line-height:1.9;white-space:pre;color:#e6edf3;overflow-x:auto}
/* ── .env in main content ── */
.env-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin:20px 0}
.env-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf2)}
.env-card-title{font-family:var(--mono);font-size:12px;color:var(--amber);display:flex;align-items:center;gap:8px}
.env-card-actions{display:flex;gap:8px}
.env-card-body{padding:16px 18px;font-family:var(--mono);font-size:13px;line-height:2;white-space:pre;overflow-x:auto;background:#010409;color:#e6edf3}
.env-security-note{display:flex;gap:10px;padding:10px 14px;background:rgba(227,179,65,.05);border-top:1px solid rgba(227,179,65,.15);font-size:11px;color:var(--ts);line-height:1.5;font-family:var(--mono)}
.navbtns{display:flex;justify-content:space-between;align-items:center;margin-top:40px;padding-top:24px;border-top:1px solid var(--bd)}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:9px 20px;border-radius:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;border:1px solid var(--bd);background:none;color:var(--tm)}
.btn:hover{background:var(--sf2);color:var(--tx)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-p{background:var(--ac);border-color:var(--ac);color:#0d1117;font-weight:600}
.btn-p:hover{background:#56d364;border-color:#56d364;color:#0d1117}
.issue{border:1px solid var(--bd);border-radius:8px;margin-bottom:10px;overflow:hidden}
.ish{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:var(--sf);transition:background .15s}
.ish:hover{background:var(--sf2)}
.ist{font-family:var(--mono);font-size:12px;color:var(--red);display:flex;align-items:center;gap:10px}
.ib{display:none;padding:16px;background:var(--bg);font-size:13px;color:var(--tm);line-height:1.7;border-top:1px solid var(--bd)}
.issue.open .ib{display:block}
.chev{color:var(--ts);transition:transform .2s;font-size:11px}
.issue.open .chev{transform:rotate(180deg)}
.sdiv{display:flex;align-items:center;gap:12px;margin:24px 0 16px;font-size:10px;font-family:var(--mono);color:var(--ts);text-transform:uppercase;letter-spacing:.1em}
.sdiv::before,.sdiv::after{content:'';flex:1;height:1px;background:var(--bd)}
p{margin-bottom:12px;color:var(--tm);line-height:1.7}
strong{color:var(--tx);font-weight:500}
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:20px 16px}
  .header-title{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-box">⚙</div>
    <span>sn-jdbc-setup</span>
  </div>
  <span class="header-sep">/</span>
  <span class="header-title" id="headerTitle">ServiceNow JDBC · Python Container · Step-by-step guide</span>
  <span class="badge">Australia release</span>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnEN" onclick="setLang('en')"><span class="flag">🇺🇸</span> EN</button>
    <div class="lang-sep"></div>
    <button class="lang-btn" id="btnPT" onclick="setLang('pt')"><span class="flag">🇧🇷</span> PT-BR</button>
  </div>
</div>

<div class="prog-bar">
  <div class="prog-steps" id="progSteps"></div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sb-section">
      <div class="sb-label" id="sbLabel">Steps</div>
      <div id="navList"></div>
    </div>
    <div class="sb-spacer"></div>
    <div class="cfg-panel">
      <div class="cfg-title"><div class="cfg-dot"></div> <span id="cfgPanelTitle">Your instance config</span></div>
      <div class="fl" id="lblInstance">Instance name</div>
      <input class="fi" id="cfgInstance" placeholder="mycompany" value="mycompany">
      <div class="cfg-hint" id="hintInstance">→ mycompany.service-now.com</div>
      <div class="fl" id="lblUser">Service account username</div>
      <input class="fi" id="cfgUser" placeholder="svc_jdbc_account" value="svc_jdbc_account">
      <div class="fl" id="lblPass">Password</div>
      <div class="pw-row">
        <input class="fi" id="cfgPass" type="password" placeholder="••••••••" autocomplete="off">
        <button class="eye-btn" id="eyeBtn" onclick="toggleEye()" title="Show/hide">👁</button>
      </div>
      <div class="fl" id="lblJar">JAR file path (in container)</div>
      <input class="fi" id="cfgJar" placeholder="/app/drivers/servicenow-jdbc-driver.jar" value="/app/drivers/servicenow-jdbc-driver.jar">
      <div class="cfg-hint" id="hintSnippets">Code snippets update live ↑</div>
    </div>

    <!-- .env download panel -->
    <div class="env-panel">
      <div class="env-panel-hdr">
        <div class="env-panel-title">⬇ <span id="envPanelTitle">.env file</span></div>
        <button class="env-dl-btn" id="sidebarDlBtn" onclick="downloadEnv()">
          <span id="sidebarDlLabel">download .env</span>
        </button>
      </div>
      <div class="env-preview" id="envPreview"></div>
    </div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<script>

let lang = 'en';

const TRANSLATIONS = {

function T() { return TRANSLATIONS[lang]; }

function setLang(l) {
  lang = l;
  document.documentElement.lang = l === 'pt' ? 'pt-BR' : 'en';
  document.getElementById('btnEN').classList.toggle('active', l === 'en');
  document.getElementById('btnPT').classList.toggle('active', l === 'pt');
  // Update static sidebar labels
  document.getElementById('headerTitle').textContent  = T().headerTitle;
  document.getElementById('sbLabel').textContent      = T().sbLabel;
  document.getElementById('cfgPanelTitle').textContent = T().cfgPanelTitle;
  document.getElementById('lblInstance').textContent  = T().lblInstance;
  document.getElementById('hintInstance').textContent = T().hintInstance;
  document.getElementById('lblUser').textContent      = T().lblUser;
  document.getElementById('lblPass').textContent      = T().lblPass;
  document.getElementById('lblJar').textContent       = T().lblJar;
  document.getElementById('hintSnippets').textContent = T().hintSnippets;
  document.getElementById('envPanelTitle').textContent  = T().envPanelTitle;
  document.getElementById('sidebarDlLabel').textContent = T().sidebarDlLabel;
  updateEnvPreview();
  render();
}

// ── Config ───────────────────────────────────────────────
const cfg = { instance: 'mycompany', user: 'svc_jdbc_account', pass: '', jar: '/app/drivers/servicenow-jdbc-driver.jar' };
document.getElementById('cfgInstance').addEventListener('input', e => { cfg.instance = e.target.value || 'myinstance'; updateTpl(); updateEnvPreview(); });
document.getElementById('cfgUser').addEventListener('input',     e => { cfg.user     = e.target.value || 'svc_jdbc';   updateTpl(); updateEnvPreview(); });
document.getElementById('cfgPass').addEventListener('input',     e => { cfg.pass     = e.target.value;                 updateEnvPreview(); });
document.getElementById('cfgJar').addEventListener('input',      e => { cfg.jar      = e.target.value || '/app/drivers/servicenow-jdbc-driver.jar'; updateTpl(); });

function updateTpl() {
  document.querySelectorAll('[data-tpl]').forEach(el => {
    const k = el.dataset.tpl;
    el.textContent = k==='instance' ? cfg.instance : k==='user' ? cfg.user : k==='jar' ? cfg.jar : k==='url' ? `jdbc:servicenow://https://${cfg.instance}.service-now.com` : el.textContent;
  });
}

<span class="cmt">${t.cmt1}</span>
<span class="var">DRIVER_CLASS</span> = <span class="str">"com.servicenow.jdbc.Driver"</span>   <span class="cmt">${t.cmt2}</span>

<span class="kw">def</span> <span class="fn">get_connection</span>():
    <span class="str">${t.doc1}</span>

        DRIVER_CLASS,

<span class="kw">def</span> <span class="fn">run_query</span>(sql: <span class="op">str</span>) -> <span class="op">list</span>[<span class="op">dict</span>]:

const CONTENT = [buildPrereqs, buildStructure, buildDockerfile, buildReqs, buildConnection, buildRun, buildVerify, buildTrouble];

// ── .env helpers ────────────────────────────────────────
function envContent() {
  const passVal = cfg.pass ? cfg.pass : T().envNoPass;
  return `SN_USER=${cfg.user}\nSN_PASS=${passVal}\n`;
}

function updateEnvPreview() {
  const el = document.getElementById('envPreview');
  if (!el) return;
  const passVal = cfg.pass
    ? cfg.pass.replace(/./g, '•')
    : T().envNoPass;
  el.innerHTML =
    `<span style="color:var(--var)">SN_USER</span>=<span style="color:var(--str)">${escHtml(cfg.user)}</span>\n` +
    `<span style="color:var(--var)">SN_PASS</span>=<span style="color:var(--str)">${escHtml(passVal)}</span>`;
  // Also refresh env card in main if visible
  const card = document.getElementById('envCardBody');
  if (card) {
    const passDisplay = cfg.pass
      ? `<span style="color:var(--str)">${escHtml(cfg.pass.replace(/./g, '•'))}</span>`
      : `<span style="color:var(--ts)">${escHtml(T().envNoPass)}</span>`;
    card.innerHTML =
      `<span style="color:var(--var)">SN_USER</span>=<span style="color:var(--str)">${escHtml(cfg.user)}</span>\n` +
      `<span style="color:var(--var)">SN_PASS</span>=${passDisplay}`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function downloadEnv(btnId) {
  const content = envContent();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type: 'text/plain'}));
  a.download = '.env';
  a.click();
  URL.revokeObjectURL(a.href);
  if (btnId) {
    const btn = document.getElementById(btnId);
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ ' + T().copied.replace('✓ ','');
      btn.classList.add('ok');
      setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('ok'); }, 2000);
    }
  }
  // Also flash sidebar button
  const sb = document.getElementById('sidebarDlBtn');
  if (sb) {
    sb.classList.add('ok');
    setTimeout(() => sb.classList.remove('ok'), 2000);
  }
}

function toggleEye() {
  const inp = document.getElementById('cfgPass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ── Render ───────────────────────────────────────────────
function render() {
  const steps = T().steps;
  document.getElementById('navList').innerHTML = steps.map((s, i) => `
    <button class="nav-btn ${i===current?'active':''} ${done.has(i)?'done':''}" onclick="goTo(${i})">
      <span class="nnum">${String(i+1).padStart(2,'0')}</span>
      <div class="ncheck">${done.has(i)?'✓':''}</div>
      <span>${s.title}</span>
    </button>`).join('');

  document.getElementById('progSteps').innerHTML = steps.map((s, i) => `
    <div class="pdot ${i===current?'active':''} ${done.has(i)?'done':''}" onclick="goTo(${i})">
      <div class="pbub">${done.has(i)?'✓':i+1}</div>
    </div>`).join('');

  const mainEl = document.getElementById('mainContent');
  mainEl.innerHTML = CONTENT[current]();

  if (current < 7) {
    const nav = document.createElement('div');
    nav.className = 'navbtns';
    nav.innerHTML = `
      <button class="btn" onclick="goTo(${current-1})" ${current===0?'disabled':''}>${T().back}</button>
      <button class="btn btn-p" onclick="advance()">${current===6 ? T().complete : T().next}</button>`;
    mainEl.appendChild(nav);
  }

  updateTpl();
  updateEnvPreview();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goTo(i)  { if(i>=0 && i<8){ current=i; render(); } }
function advance(){ done.add(current); if(current<7){ current++; render(); } }
function restart(){ current=0; done.clear(); render(); }

function copyCode(btn) {
  const text = btn.closest('.cw').querySelector('.cb').innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = T().copied;
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = T().copy; btn.classList.remove('ok'); }, 2000);
  });
}

function copyEnv(btn) {
  navigator.clipboard.writeText(envContent()).then(() => {
    const orig = btn.textContent;
    btn.textContent = T().copied;
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = T().envCopyLabel; btn.classList.remove('ok'); }, 2000);
  });
}

function toggleCheck(el) {
  el.classList.toggle('checked');
  const c = document.getElementById('ckcount');
  if (c) c.textContent = document.querySelectorAll('.ci.checked').length;
}

function toggleIssue(el) { el.classList.toggle('open'); }

render();
updateEnvPreview();
</script>
